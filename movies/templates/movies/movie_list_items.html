{% for movie in movies %}
    <a href="{% url 'movie_detail' movie.tmdb_id %}" class="movie-card">
        {% if movie.poster_url %}
            <img src="{{ movie.poster_url }}" alt="{{ movie.title }}" class="movie-poster">
        {% endif %}
        <p class="movie-title">{{ movie.title }}</p>
        {% if movie.avg_rating %}
            <p class="movie-rating">★ {{ movie.avg_rating|floatformat:1 }}</p>
        {% endif %}
    </a>
{% empty %}
    <p class="no-results">検索結果が見つかりませんでした。</p>
{% endfor %}
