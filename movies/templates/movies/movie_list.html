{% extends 'movies/base.html' %}

{% block title %}{{ heading }}{% endblock %}

{% block content %}
    <form method="get" class="search-form">
        <input type="text" name="query" placeholder="映画タイトルを検索" value="{{ query }}">
        <button type="submit">検索</button>
        {% if query %}
            <a href="{% url 'movie_list' %}" class="reset-link">人気映画に戻る</a>
        {% endif %}
    </form>

    <h2>{{ heading }}</h2>

    <ul class="movie-list" id="movie-list">
        {% include 'movies/movie_list_items.html' %}
    </ul>

    {% if has_next %}
        <div class="load-more-wrap">
            <button id="load-more-btn" data-next-page="{{ page|add:'1' }}" data-query="{{ query }}">
                もっと見る
            </button>
        </div>
    {% endif %}

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const btn = document.getElementById('load-more-btn');
            if (!btn) return;

            btn.addEventListener('click', function () {
                const page = btn.dataset.nextPage;
                const query = btn.dataset.query;

                const url = new URL(window.location.href);
                url.searchParams.set('page', page);
                if (query) {
                    url.searchParams.set('query', query);
                }

                fetch(url, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById('movie-list').insertAdjacentHTML('beforeend', html);
                        btn.dataset.nextPage = parseInt(page) + 1;
                    });
            });
        });
    </script>
{% endblock %}
